<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A P A R M E L</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            font-family: Calibri, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            width: 100%;
            background: rgba(0, 0, 0, 0.92);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
        }

        .topbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.35rem;
            font-weight: bold;
            white-space: nowrap;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .nav-item {
            width: auto;
            color: white;
            padding: 8px 14px;
            border: 1px solid transparent;
            border-radius: 999px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            font: inherit;
            background: transparent;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .container {
            width: 100%;
            max-width: 100%;
        }

        .hero-link {
            display: block;
            width: 100%;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        main {
            width: 100%;
        }

        @media (max-width: 720px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="topbar">
            <nav>
                <button class="nav-item" type="button">Missão</button>
                <button class="nav-item" type="button">Associados</button>
                <button class="nav-item" type="button">Diretoria</button>
                <a class="nav-item" href="https://www.instagram.com/aparmel_pr/" target="_blank" rel="noopener noreferrer">Contato</a>
            </nav>
        </div>
    </header>

    <main id="inicio">
        <div class="container">
        <a class="hero-link" href="https://www.instagram.com/aparmel_pr/">
            <img src="image001.png" alt="APARMEL">
        </a>
        </div>
    </main>

</body>
</html>
